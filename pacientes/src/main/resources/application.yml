spring:
  application:
    name: ms-pacientes
  datasource:
    url: jdbc:mysql://localhost:3306/db_personas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  liquibase:
    enabled: false

server:
  port: 9091
